name: Deploy to GitHub Pages

# Déploie automatiquement à chaque push sur main.
on:
  push:
    branches: [main]
  workflow_dispatch: # permet aussi un déclenchement manuel depuis l'onglet Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Empêche deux déploiements simultanés.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lint AVANT build : 0 erreur actuellement (13 warnings connus, non
      # bloquants — voir react-hooks/exhaustive-deps et
      # react-refresh/only-export-components). ESLint sort en code 0 tant
      # qu'il n'y a que des warnings ; ce step échoue seulement si une
      # vraie erreur de lint est introduite.
      - name: Lint
        run: npm run lint

      # Tests AVANT build : logique pure (utils, defaults/migrateData,
      # guards, schema). Rapide (<1s), doit échouer la CI si une régression
      # est poussée — c'est justement ce que la CI actuelle ne détectait
      # pas (les tests n'étaient exécutés qu'en local).
      - name: Test
        run: npm run test

      # Le typecheck est déjà inclus dans "npm run build" via "tsc -b".
      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
